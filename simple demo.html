<!-- Вместо вашей сложной сцены с маркером -->
<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
  <!-- Модель просто висит в воздухе перед камерой -->
  <a-entity
    gltf-model="url(model.glb)"
    animation-mixer
    position="0 1 -3"  <!-- x=0, y=1, z=-3 (перед камерой) -->
    scale="0.3 0.3 0.3"
  ></a-entity>
  
  <!-- Обычная камера, не привязанная к маркеру -->
  <a-entity camera></a-entity>
</a-scene>
